<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI软件指令速查</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f3f8;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2);
            padding: 32px 36px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 500;
            color: #1a2b3c;
            margin-bottom: 30px;
        }
        .select-row {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 32px;
        }
        .select-group {
            flex: 1 1 280px;
        }
        .select-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #4f6e90;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        select {
            width: 100%;
            padding: 16px 22px;
            font-size: 1rem;
            border: 2px solid #d0deef;
            border-radius: 40px;
            background-color: #f9fcff;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%23395e7e" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 22px center;
            cursor: pointer;
            outline: none;
            transition: 0.2s;
            color: #1f3142;
            font-weight: 450;
        }
        select:hover {
            border-color: #8ba2c2;
            background-color: #f0f7ff;
        }
        select:focus {
            border-color: #1f4977;
            box-shadow: 0 0 0 3px rgba(31,73,119,0.1);
        }
        .result-area {
            background: #f5faff;
            border-radius: 24px;
            padding: 24px;
            min-height: 240px;
            border: 1px solid #d7e2f1;
        }
        .placeholder-msg, .no-command-msg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: #859fb9;
            min-height: 200px;
            font-size: 1.1rem;
        }
        .no-command-msg {
            color: #b13e3e;
        }
        .command-block {
            background: white;
            border-radius: 20px;
            padding: 24px 28px;
            border-left: 6px solid #1f4977;
            box-shadow: 0 8px 16px rgba(0,0,0,0.03);
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
            font-size: 0.95rem;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            color: #003366;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>MI软件指令速查</h1>

    <div class="select-row">
        <div class="select-group">
            <label>芯片型号</label>
            <select id="chipSelect">
                <!-- 将在JS中填充 -->
            </select>
        </div>
        <div class="select-group">
            <label>指令功能</label>
            <select id="funcSelect">
                <!-- 将在JS中填充 -->
            </select>
        </div>
    </div>

    <div class="result-area" id="resultArea">
        <div class="placeholder-msg" id="placeholderMsg">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#859fb9" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
            <span>请选择芯片型号与指令功能</span>
        </div>
        <div class="no-command-msg" id="noCommandMsg" style="display: none;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#b13e3e" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="#b13e3e" stroke="none"/></svg>
            <span>无指令</span>
        </div>
        <div id="commandDisplay" style="display: none;"></div>
    </div>
</div>

        // 获取元素
        const chipSelect = document.getElementById('chipSelect');
        const funcSelect = document.getElementById('funcSelect');
        const placeholderMsg = document.getElementById('placeholderMsg');
        const noCommandMsg = document.getElementById('noCommandMsg');
        const commandDisplay = document.getElementById('commandDisplay');

        // 填充下拉框
        if (chipSelect) {
            chipSelect.innerHTML = '';
            chipList.forEach(chip => {
                const option = document.createElement('option');
                option.value = chip;
                option.textContent = chip;
                chipSelect.appendChild(option);
            });
        }

        if (funcSelect) {
            funcSelect.innerHTML = '';
            functionList.forEach(func => {
                const option = document.createElement('option');
                option.value = func;
                option.textContent = func;
                funcSelect.appendChild(option);
            });
        }

        // 更新显示的函数
        function updateDisplay() {
            if (!chipSelect || !funcSelect || !placeholderMsg || !noCommandMsg || !commandDisplay) return;
            
            const chip = chipSelect.value;
            const func = funcSelect.value;
            const key = chip + '|' + func;
            const command = cmdMap[key];

            // 隐藏所有显示元素
            placeholderMsg.style.display = 'none';
            noCommandMsg.style.display = 'none';
            commandDisplay.style.display = 'none';

            if (command) {
                // 有指令：显示指令
                commandDisplay.style.display = 'block';
                commandDisplay.innerHTML = `
                    <div class="command-block">
                        <div style="white-space: pre-wrap;">${command.replace(/\n/g, '<br>')}</div>
                    </div>
                `;
            } else {
                // 无指令：显示"无指令"
                noCommandMsg.style.display = 'flex';
            }
        }

        // 绑定事件
        if (chipSelect && funcSelect) {
            chipSelect.addEventListener('change', updateDisplay);
            funcSelect.addEventListener('change', updateDisplay);
            updateDisplay();
        }
    })();
</script>
